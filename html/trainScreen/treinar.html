<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Kinetic — Fichas de Treino</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"/>
<style>
  html, body { margin: 0; padding: 0; background: #07090b; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 28px 16px; box-sizing: border-box; }
  .kinetic-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .kinetic-scroll { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="treinar.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "layout": "compacto",
    "cores": "colorido",
    "ia": "visível"
  }/*EDITMODE-END*/;

  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

    return (
      <div style={{ position: 'relative' }}>
        <IOSDevice width={402} height={874} dark={true}>
          <TreinarScreen tweaks={tweaks}/>
        </IOSDevice>

        <TweaksPanel>
          <TweakSection label="Layout dos cards"/>
          <TweakRadio
            label="Estilo"
            options={['compacto', 'imagem']}
            value={tweaks.layout}
            onChange={v => setTweak('layout', v)}
          />

          <TweakSection label="Cores por dia"/>
          <TweakRadio
            label="Palette"
            options={['colorido', 'mono']}
            value={tweaks.cores}
            onChange={v => setTweak('cores', v)}
          />

          <TweakSection label="Badge IA"/>
          <TweakRadio
            label="Aviso"
            options={['visível', 'oculto']}
            value={tweaks.ia}
            onChange={v => setTweak('ia', v)}
          />
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
