<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Kinetic — Auth Flow</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"/>
<style>
  html, body { margin: 0; padding: 0; background: #07090b; }
  body {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; gap: 36px; padding: 28px 16px;
    box-sizing: border-box;
  }
  .kinetic-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .kinetic-scroll { -ms-overflow-style: none; scrollbar-width: none; }

  /* side labels */
  .device-label {
    font-family: Inter, system-ui, sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: rgba(245,246,247,0.3);
    text-align: center; margin-top: 12px;
  }
</style>
</head>
<body>
<div id="root-welcome" class="device-col"></div>
<div id="root-returning" class="device-col"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>

<script type="text/babel" data-presets="env,react">
  /* --- Device 1: Welcome + Login flow --- */
  function DeviceWelcome() {
    return (
      <div>
        <IOSDevice width={390} height={844} dark={true}>
          <AuthFlow startAt="welcome"/>
        </IOSDevice>
        <div className="device-label">Novo usuário</div>
      </div>
    );
  }

  /* --- Device 2: Returning user (biometric) --- */
  function DeviceReturning() {
    return (
      <div>
        <IOSDevice width={390} height={844} dark={true}>
          <AuthFlow startAt="returning"/>
        </IOSDevice>
        <div className="device-label">Usuário recorrente</div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root-welcome')).render(<DeviceWelcome/>);
  ReactDOM.createRoot(document.getElementById('root-returning')).render(<DeviceReturning/>);
</script>
</body>
</html>
