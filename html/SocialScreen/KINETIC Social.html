    button { font-family: inherit; }

    @keyframes kSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }

<body>
<div id="root"></div>
<script type="text/babel">

const COMMENTS = {

    { initials:'DA', bg:USERS.david.bg,  name:'David',     time:'30 min', text:'Inspiração total, parabéns 👏',                    likes:1 },
  ],
  post2: [
    { initials:'SJ', bg:USERS.sarah.bg, name:'Sarah J.', time:'2 h', text:'Pernas de aço! 🦵 Respeito.',     likes:3 },
    { initials:'EL', bg:USERS.elena.bg, name:'Elena',    time:'1 h', text:'62 minutos de leg? Tá voando.',   likes:1 },
  ],

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#00D4C8",
  "postData": "overlay",
  "commentStyle": "sheet",
  "showSecondPost": true,
  "postEntryPoint": "fab"
}/*EDITMODE-END*/;

/* ─── Icons ───────────────────────────────────────────────────── */
const IcBell      = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;

const IcComment   = ({s=17}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;

const IcDumbbell  = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="14" y="6" width="2" height="12" rx="1"/><rect x="8" y="6" width="2" height="12" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/><rect x="5" y="9" width="3" height="6" rx="1.5"/><rect x="16" y="9" width="3" height="6" rx="1.5"/></svg>;
const IcBar       = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
const IcPeople    = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
const IcPerson    = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
const IcSend      = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;

/* ─── Avatar ──────────────────────────────────────────────────── */
function Avatar({ initials, bg, size = 44 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', background: bg, flexShrink: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: '#fff', fontWeight: 700, fontSize: size * 0.32, letterSpacing: 0.4,
    }}>{initials}</div>
  );
}

/* ─── Story Bubble ────────────────────────────────────────────── */
// ringState: 'add' | 'unseen' | 'seen'
function StoryBubble({ user, ringState, isTraining, accent, onPress }) {
  const ringColor = ringState === 'unseen' ? accent : '#2C2C2E';
  const ringBorder = ringState === 'add'
    ? `2px dashed ${accent}`
    : `2.5px solid ${ringColor}`;

  return (
    <button onClick={onPress} style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
      background: 'none', border: 'none', cursor: 'pointer', flexShrink: 0, padding: '2px 0',
    }}>
      <div style={{ position: 'relative' }}>
        <div style={{
          width: 60, height: 60, borderRadius: '50%', border: ringBorder,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'border-color 0.25s',
        }}>
          {ringState === 'add' ? (
            <div style={{
              width: 52, height: 52, borderRadius: '50%', background: '#1C1C1E',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: accent, fontSize: 26, fontWeight: 300,
            }}>+</div>
          ) : (
            <Avatar initials={user.initials} bg={user.bg} size={52} />
          )}
        </div>
        {/* ✅ FIX 2.2 — Green training dot */}
        {isTraining && (
          <div style={{
            position: 'absolute', bottom: 1, right: 1,
            width: 14, height: 14, borderRadius: '50%',
            background: '#2ECC71', border: '2.5px solid #0A0A0A',
          }} />
        )}
      </div>
      <span style={{ color: ringState === 'seen' ? '#484848' : '#B0B0B0', fontSize: 11, fontWeight: 500, whiteSpace: 'nowrap' }}>
        {user.name}
      </span>
    </button>
  );
}

/* ─── Gym Photo Placeholder ───────────────────────────────────── */
function GymPhoto({ workout, postData, accent }) {
  return (
    <div style={{
      position: 'relative', width: '100%', height: 200, overflow: 'hidden',
      background: 'linear-gradient(160deg, #0b1622 0%, #16253a 50%, #0f1d2e 100%)',
    }}>
      {/* Ambient glow */}
      <div style={{ position:'absolute', inset:0, background:`radial-gradient(ellipse at 68% 55%, ${accent}18 0%, transparent 65%)` }} />
      {/* Equipment silhouette */}
      <svg style={{ position:'absolute', bottom:0, left:'50%', transform:'translateX(-50%)', opacity:0.1 }} width="360" height="170" viewBox="0 0 360 170">
        <rect x="65" y="78" width="230" height="10" rx="5" fill="#fff"/>
        <rect x="44" y="55" width="38" height="56" rx="8" fill="#fff"/>
        <rect x="278" y="55" width="38" height="56" rx="8" fill="#fff"/>
        <rect x="76" y="64" width="24" height="36" rx="4" fill="#fff"/>
        <rect x="260" y="64" width="24" height="36" rx="4" fill="#fff"/>
        <ellipse cx="180" cy="44" rx="17" ry="19" fill="#fff"/>
        <path d="M163 64 Q148 88 153 116 Q163 122 180 122 Q197 122 207 116 Q212 88 197 64Z" fill="#fff"/>
        <line x1="153" y1="80" x2="82" y2="80" stroke="#fff" strokeWidth="9" strokeLinecap="round"/>
        <line x1="207" y1="80" x2="278" y2="80" stroke="#fff" strokeWidth="9" strokeLinecap="round"/>
      </svg>

      {/* ✅ FIX 1.2 — Workout data overlay */}
      {postData === 'overlay' && (
        <div style={{
          position:'absolute', bottom:0, left:0, right:0,
          background:'linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.3) 60%, transparent 100%)',
          padding:'30px 14px 14px',
        }}>
          <div style={{

/* ─── Comments ────────────────────────────────────────────────── */
function CommentRow({ c, accent }) {
  const [liked, setLiked] = React.useState(false);
  const [likes, setLikes] = React.useState(c.likes || 0);
  return (
    <div style={{ display:'flex', gap:10, padding:'10px 0' }}>
      <Avatar initials={c.initials} bg={c.bg} size={34} />
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:7 }}>
          <span style={{ color:'#fff', fontSize:13, fontWeight:700 }}>{c.name}</span>
          <span style={{ color:'#666', fontSize:11 }}>{c.time}</span>
        </div>
        <p style={{ color:'#D8D8D8', fontSize:13, lineHeight:1.45, marginTop:2 }}>{c.text}</p>
        <button onClick={() => { setLiked(!liked); setLikes(l => l + (liked ? -1 : 1)); }} style={{
          background:'none', border:'none', cursor:'pointer', marginTop:5, padding:0,
          color: liked ? accent : '#666', fontSize:12, fontWeight:600, transition:'color 0.15s',
        }}>Curtir{likes > 0 ? ` · ${likes}` : ''}</button>
      </div>
    </div>
  );
}

function CommentInput({ accent }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 16px 14px', borderTop:'1px solid #1E1E1E' }}>
      <Avatar initials="EU" bg="linear-gradient(135deg,#555,#333)" size={32} />
      <div style={{ flex:1, display:'flex', alignItems:'center', background:'#222', borderRadius:20, padding:'9px 14px' }}>
        <span style={{ color:'#666', fontSize:13 }}>Adicionar comentário…</span>
      </div>
      <button style={{ background:'none', border:'none', cursor:'pointer', color:accent, padding:4 }}>
        <IcSend s={20} />
      </button>
    </div>
  );
}

// Comments rendered inline, below the post's action bar
function InlineComments({ comments, accent }) {
  return (
    <div style={{ borderTop:'1px solid #1A1A1A', padding:'0 16px', animation:'kRise 0.22s ease' }}>
      {comments.map((c, i) => <CommentRow key={i} c={c} accent={accent} />)}
      <CommentInput accent={accent} />
    </div>
  );
}

// Comments as a bottom sheet overlay (clipped inside the phone frame)
function CommentsSheet({ post, comments, accent, onClose }) {
  return (
    <div style={{ position:'absolute', inset:0, zIndex:100 }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.6)', animation:'kFade 0.2s ease' }} />
      <div style={{
        position:'absolute', left:0, right:0, bottom:0, height:'76%',
        background:'#141414', borderRadius:'22px 22px 0 0',
        display:'flex', flexDirection:'column', overflow:'hidden',
        animation:'kSheet 0.3s cubic-bezier(0.32,0.72,0,1)',
        boxShadow:'0 -10px 40px rgba(0,0,0,0.5)',
      }}>
        <div style={{ display:'flex', justifyContent:'center', paddingTop:10 }}>
          <div style={{ width:40, height:5, borderRadius:10, background:'#3A3A3A' }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 16px 10px' }}>
          <span style={{ color:'#fff', fontSize:16, fontWeight:700 }}>Comentários · {comments.length}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'#888', fontSize:24, lineHeight:1, padding:'0 4px' }}>×</button>
        </div>
        {/* Context: which post you're commenting on */}
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 16px', background:'#0E0E0E', borderTop:'1px solid #1E1E1E', borderBottom:'1px solid #1E1E1E' }}>
          <Avatar initials={post.initials} bg={post.bg} size={30} />
          <div style={{ flex:1, minWidth:0, display:'flex', flexWrap:'wrap', alignItems:'baseline', gap:'0 7px' }}>
            <span style={{ color:'#fff', fontSize:12, fontWeight:700 }}>{post.name}</span>
            <span style={{ color:accent, fontSize:11, fontWeight:700 }}>{post.workout}</span>
          </div>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:'4px 16px' }}>
          {comments.map((c, i) => <CommentRow key={i} c={c} accent={accent} />)}
        </div>
        <CommentInput accent={accent} />
      </div>
    </div>
  );
}

/* ─── Compose Sheet (FAB flow) ───────────────────────────────── */
function ComposeSheet({ accent, onClose, onPublish }) {
  const [intensity, setIntensity] = React.useState('ALTA');
  const [caption, setCaption] = React.useState('');
  return (
    <div style={{ position:'absolute', inset:0, zIndex:150 }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.65)', animation:'kFade 0.2s ease' }} />
      <div style={{
        position:'absolute', left:0, right:0, bottom:0, height:'90%',
        background:'#141414', borderRadius:'22px 22px 0 0',
        display:'flex', flexDirection:'column', overflow:'hidden',
        animation:'kSheet 0.3s cubic-bezier(0.32,0.72,0,1)',
        boxShadow:'0 -10px 40px rgba(0,0,0,0.5)',
      }}>
        <div style={{ display:'flex', justifyContent:'center', paddingTop:10, flexShrink:0 }}>
          <div style={{ width:40, height:5, borderRadius:10, background:'#3A3A3A' }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 16px 12px', flexShrink:0 }}>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'#888', fontSize:15, fontWeight:500, fontFamily:'inherit' }}>Cancelar</button>
          <span style={{ color:'#fff', fontSize:16, fontWeight:700 }}>Novo Post</span>
          <button onClick={onPublish} style={{
            background:accent, border:'none', cursor:'pointer', fontFamily:'inherit',
            color:'#000', fontSize:13, fontWeight:800, borderRadius:20, padding:'7px 18px',
          }}>Publicar</button>
        </div>
        <div style={{ flex:1, overflowY:'auto' }}>
          <div style={{ margin:'0 16px 14px', padding:'12px 14px', background:'#0E0E0E', borderRadius:14, border:`1px solid ${accent}33` }}>
            <span style={{ color:accent, fontSize:12, fontWeight:700 }}>🏋️ Treino detectado automaticamente</span>
            <div style={{ display:'flex', gap:8, marginTop:6, flexWrap:'wrap', alignItems:'center' }}>
              <span style={{ color:'#888', fontSize:12 }}>Peito &amp; Tríceps</span>
              <span style={{ color:'#333', fontSize:12 }}>·</span>
              <span style={{ color:'#888', fontSize:12 }}>48min</span>
              <span style={{ color:'#333', fontSize:12 }}>·</span>
              <span style={{ color:accent, fontSize:12, fontWeight:700 }}>2 PRs 🏆</span>
            </div>
          </div>
          <div style={{ padding:'0 16px 14px', display:'flex', gap:10, alignItems:'flex-start' }}>
            <Avatar initials="EU" bg="linear-gradient(135deg,#555,#333)" size={36} />
            <textarea
              placeholder="Adicione uma legenda…"
              value={caption}
              onChange={e => setCaption(e.target.value)}
              style={{ flex:1, background:'none', border:'none', outline:'none', resize:'none', color:'#fff', fontSize:14, lineHeight:1.5, fontFamily:'inherit', minHeight:80 }}
            />
          </div>
          <div style={{ padding:'14px 16px', borderTop:'1px solid #1E1E1E' }}>
            <span style={{ color:'#888', fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:0.8 }}>Intensidade</span>
            <div style={{ display:'flex', gap:8, marginTop:10 }}>
              {['LEVE','MODERADO','ALTA'].map(lv => (
                <button key={lv} onClick={() => setIntensity(lv)} style={{
                  flex:1, padding:'9px 0', borderRadius:10,
                  border:`1.5px solid ${intensity === lv ? accent : '#2A2A2A'}`,
                  background: intensity === lv ? `${accent}18` : 'transparent',
                  color: intensity === lv ? accent : '#555',
                  fontSize:11, fontWeight:700, cursor:'pointer', letterSpacing:0.5,
                  transition:'all 0.15s', fontFamily:'inherit',
                }}>{lv}</button>
              ))}
            </div>
          </div>
          <div style={{ padding:'14px 16px 28px', borderTop:'1px solid #1E1E1E' }}>
            <button style={{ display:'flex', alignItems:'center', gap:12, background:'none', border:'none', cursor:'pointer', color:'#888', padding:0, fontFamily:'inherit' }}>
              <div style={{ width:38, height:38, borderRadius:10, background:'#1A1A1A', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>📷</div>
              <span style={{ fontSize:14 }}>Adicionar foto do treino</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Post-Workout Share Screen ──────────────────────────────── */

  const [shared, setShared] = React.useState(false);
  const handleShare = () => { setShared(true); setTimeout(onDone, 1700); };
  return (
    <div style={{
      position:'absolute', inset:0, zIndex:200,
      background:'#050505', display:'flex', flexDirection:'column',
      animation:'kFade 0.3s ease',
    }}>
      <div style={{ paddingTop:66, display:'flex', justifyContent:'flex-end', padding:'70px 20px 0', flexShrink:0 }}>
        <button onClick={onDone} style={{ background:'none', border:'none', cursor:'pointer', color:'#555', fontSize:13, fontWeight:500, fontFamily:'inherit' }}>Pular</button>
      </div>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 24px' }}>
        <div style={{ fontSize:56, marginBottom:12 }}>🏆</div>
        <div style={{ color:'#fff', fontSize:26, fontWeight:800, letterSpacing:-0.5, textAlign:'center' }}>Treino Concluído!</div>
        <div style={{ color:'#666', fontSize:14, marginTop:6, textAlign:'center' }}>Peito &amp; Tríceps · 48min · 2 PRs</div>
        <div style={{ display:'flex', gap:10, marginTop:26, width:'100%' }}>
          {[{ label:'Duração', value:'48min' }, { label:'Exercícios', value:'6' }, { label:'PRs', value:'2 🏆' }].map(({ label, value }) => (
            <div key={label} style={{ flex:1, background:'#111', borderRadius:14, padding:'14px 8px', border:'1px solid #1E1E1E', textAlign:'center' }}>
              <div style={{ color:accent, fontSize:18, fontWeight:800 }}>{value}</div>
              <div style={{ color:'#666', fontSize:11, marginTop:4 }}>{label}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop:16, width:'100%', background:'#0E0E0E', borderRadius:16, padding:'14px 16px', border:'1px solid #1A1A1A' }}>
          <div style={{ color:'#888', fontSize:10, fontWeight:700, letterSpacing:1, textTransform:'uppercase', marginBottom:10 }}>Squad vai ver</div>
          <div style={{ display:'flex', alignItems:'center' }}>
            {[USERS.sarah, USERS.marcus, USERS.elena, USERS.david].map((u, i) => (
              <div key={i} style={{ width:30, height:30, borderRadius:'50%', background:u.bg, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:10, fontWeight:700, border:'2px solid #0E0E0E', marginLeft: i > 0 ? -8 : 0 }}>{u.initials}</div>
            ))}
            <span style={{ color:'#666', fontSize:12, marginLeft:12 }}>e mais 4 do squad</span>
          </div>
        </div>
      </div>
      <div style={{ padding:'0 24px 44px', display:'flex', flexDirection:'column', gap:10, flexShrink:0 }}>
        {shared ? (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10, padding:'16px', animation:'kRise 0.25s ease' }}>
            <span style={{ fontSize:20 }}>✅</span>
            <span style={{ color:accent, fontSize:15, fontWeight:700 }}>Compartilhado com o Squad!</span>
          </div>
        ) : (
          <>
            <button onClick={handleShare} style={{
              background:accent, border:'none', borderRadius:16, padding:'15px',
              color:'#000', fontSize:15, fontWeight:800, cursor:'pointer', fontFamily:'inherit',
              display:'flex', alignItems:'center', justifyContent:'center', gap:8,
              boxShadow:`0 4px 24px ${accent}50`,
            }}>🔥 Compartilhar com o Squad</button>
            <button onClick={onDone} style={{ background:'none', border:'none', cursor:'pointer', color:'#555', fontSize:14, padding:'10px', fontFamily:'inherit' }}>Pular por agora</button>
          </>
        )}
      </div>
    </div>
  );
}

/* ─── Post Card ───────────────────────────────────────────────── */
function PostCard({ user, comments, commentStyle, commentsOpen, onToggleComments, kudosActive, kudosCount, onKudos, accent, postData }) {
  return (
    <div style={{ background:'#0A0A0A', borderBottom:'1px solid #1A1A1A' }}>
      {/* Post header */}
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'14px 16px 10px' }}>
        <Avatar initials={user.initials} bg={user.bg} size={40} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:7 }}>
            <span style={{ color:'#fff', fontSize:14, fontWeight:700 }}>{user.name}</span>
            {/* ✅ FIX 2.2 — Training status badge */}
            {user.isTraining && (
              <span style={{
                fontSize:9, color:'#2ECC71', background:'rgba(46,204,113,0.13)',
                borderRadius:20, padding:'2px 7px', fontWeight:800, letterSpacing:0.6,
                flexShrink:0,
              }}>TREINANDO</span>
            )}
          </div>
          {/* ✅ FIX 3.2 — Secondary text contrast improved to #A0A0A0 */}
          <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:3 }}>
            <span style={{ color:'#A0A0A0', fontSize:12 }}>{user.timeAgo}</span>
            <span style={{ color:'#333' }}>·</span>
            <span style={{ color:accent, fontSize:11, fontWeight:700, letterSpacing:0.5 }}>{user.intensity}</span>
          </div>
        </div>
        <button style={{ background:'none', border:'none', cursor:'pointer', color:'#555', padding:8 }}>
          <IcMore />
        </button>
      </div>

      {/* ✅ FIX 1.2 — Workout chip in card mode (below header, above photo) */}
      {postData === 'card' && (
        <div style={{ padding:'0 16px 10px' }}>
          <div style={{
            display:'inline-flex', alignItems:'center',
            background:'#161616', borderRadius:20, padding:'6px 14px',
            border:`1px solid ${accent}33`,
          }}>
            <span style={{ color:accent, fontSize:12, fontWeight:700 }}>{user.workout}</span>
          </div>
        </div>
      )}

      <GymPhoto workout={user.workout} postData={postData} accent={accent} />

      {/* ✅ FIX 1.1 — Action bar: Kudos + Comment + Share */}
      <div style={{ display:'flex', alignItems:'center', padding:'8px 14px', gap:4 }}>
        <button onClick={onKudos} style={{
          display:'flex', alignItems:'center', gap:6,
          background:'none', border:'none', cursor:'pointer', padding:'7px 12px 7px 0',
          color: kudosActive ? accent : '#666', fontSize:13, fontWeight:600,
          transition:'color 0.15s',
        }}>
          <span style={{ fontSize:17, filter: kudosActive ? 'none' : 'grayscale(1)', transition:'filter 0.15s' }}>🔥</span>
          <span>{kudosCount}</span>
        </button>
        <button onClick={onToggleComments} style={{
          display:'flex', alignItems:'center', gap:6,
          background:'none', border:'none', cursor:'pointer', padding:'7px 12px',
          color: (commentsOpen && commentStyle === 'inline') ? accent : '#666', fontSize:13, fontWeight:500,
          transition:'color 0.15s',
        }}>
          <IcComment /><span>{user.commentCount}</span>
        </button>
        <div style={{ flex:1 }} />
        <button style={{ background:'none', border:'none', cursor:'pointer', padding:'7px 0', color:'#666' }}>
          <IcShare />
        </button>
      </div>

      {/* Comments — inline mode expands within the card */}
      {commentStyle === 'inline' && commentsOpen && (
        <InlineComments comments={comments} accent={accent} />
      )}
    </div>
  );
}

/* ─── Bottom Nav ──────────────────────────────────────────────── */
const NAV_TABS = [
  { id:'home',   label:'Home',   Icon: IcHome     },
  { id:'train',  label:'Treinar',Icon: IcDumbbell  },
  { id:'stats',  label:'Stats',  Icon: IcBar      },
  { id:'social', label:'Social', Icon: IcPeople   },
  { id:'perfil', label:'Perfil', Icon: IcPerson   },
];
function BottomNav({ accent }) {
  const [active, setActive] = React.useState('social');
  return (
    <div style={{ display:'flex', background:'#0A0A0A', borderTop:'1px solid #1A1A1A', paddingBottom:24, flexShrink:0 }}>
      {NAV_TABS.map(({ id, label, Icon }) => {
        const on = id === active;
        return (
          <button key={id} onClick={() => setActive(id)} style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center',
            gap:3, paddingTop:10, paddingBottom:4,
            background:'none', border:'none', cursor:'pointer',
            color: on ? accent : '#555', transition:'color 0.15s',
          }}>
            <Icon s={22} />
            <span style={{ fontSize:10, fontWeight: on ? 700 : 400 }}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ─── Main App ────────────────────────────────────────────────── */
function KineticSocial() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = t.accent;

  // ✅ FIX 2.2 — Story ring states (unseen/seen toggle on tap)
  const [rings, setRings] = React.useState({ sarah:'unseen', marcus:'seen', elena:'unseen', david:'seen' });
  const tapStory = (name) => setRings(p => ({ ...p, [name]: p[name] === 'unseen' ? 'seen' : 'unseen' }));

  // ✅ FIX 1.1 — Kudos interactive state
  const [kudosActive, setKudosActive] = React.useState({ post1:false, post2:false });
  const [kudosCount,  setKudosCount]  = React.useState({ post1:24,    post2:12    });
  const toggleKudos = (id) => {
    setKudosActive(p => {
      const next = { ...p, [id]: !p[id] };
      setKudosCount(c => ({ ...c, [id]: c[id] + (p[id] ? -1 : 1) }));
      return next;
    });
  };

  // Comments: which post's comments are open (null | 'post1' | 'post2')
  const [openComments, setOpenComments] = React.useState(null);
  const toggleComments = (id) => setOpenComments(o => (o === id ? null : id));
  const POSTS = { post1: { user: USERS.sarah, comments: COMMENTS.post1 }, post2: { user: USERS.marcus, comments: COMMENTS.post2 } };

  const [composeOpen, setComposeOpen] = React.useState(false);
  const [workoutDone, setWorkoutDone] = React.useState(false);
  const [publishToast, setPublishToast] = React.useState(false);
  const handlePublish = () => {
    setComposeOpen(false);
    setPublishToast(true);
    setTimeout(() => setPublishToast(false), 2500);
  };

  return (
    <>
      {/* Phone frame */}
      <div style={{ display:'flex', justifyContent:'center', alignItems:'center', minHeight:'100vh' }}>
        <IOSDevice dark>
          <div style={{ position:'relative', height:'100%', background:'#0A0A0A', display:'flex', flexDirection:'column', overflow:'hidden' }}>

            {/* ✅ FIX 3.3 — Header with Add Person + Bell badge */}
            <div style={{ paddingTop:66, padding:'66px 20px 12px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
              <span style={{ color:'#fff', fontSize:26, fontWeight:800, letterSpacing:-0.5 }}>KINETIC</span>
              <div style={{ display:'flex', gap:18, alignItems:'center' }}>
                {/* ✅ FIX 2.1 — Dedicated add-person icon */}
                <button style={{ background:'none', border:'none', cursor:'pointer', color:'#888', padding:4 }}>
                  <IcPersonAdd s={22} />
                </button>
                {/* ✅ FIX 3.3 — Bell with count badge */}
                <button style={{ background:'none', border:'none', cursor:'pointer', color:'#888', padding:4, position:'relative' }}>
                  <IcBell s={22} />
                  <span style={{
                    position:'absolute', top:0, right:0,
                    background:accent, color:'#000',
                    borderRadius:999, fontSize:9, fontWeight:800,
                    minWidth:15, height:15,
                    display:'flex', alignItems:'center', justifyContent:'center', padding:'0 3px',
                  }}>3</span>
                </button>
              </div>
            </div>

            {/* Scrollable feed */}
            <div style={{ flex:1, overflowY:'auto', overflowX:'hidden' }}>

              {/* ✅ FIX 2.1 — Squad stories with clear "Seu story +" as first item */}
              <div style={{ marginBottom:4 }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 20px 10px' }}>
                  <span style={{ color:'#fff', fontSize:16, fontWeight:700 }}>Squad</span>
                  {/* "Adicionar" is now clearly for adding people, not stories */}
                  <button style={{ background:'none', border:'none', color:accent, fontSize:13, fontWeight:600, cursor:'pointer' }}>+ Adicionar</button>
                </div>

                {/* ✅ FIX 2.2 — Ring state legend */}
                <div style={{ display:'flex', gap:14, padding:'0 20px 10px', alignItems:'center' }}>
                  {[{ color:accent, label:'novo story' }, { color:'#2ECC71', label:'treinando' }, { color:'#2C2C2E', label:'visto' }].map(({ color, label }) => (
                    <div key={label} style={{ display:'flex', alignItems:'center', gap:4 }}>
                      <div style={{ width:7, height:7, borderRadius:'50%', background:color }} />
                      <span style={{ fontSize:10, color:'#505050' }}>{label}</span>
                    </div>
                  ))}
                </div>

                <div style={{ display:'flex', gap:14, paddingLeft:20, paddingRight:20, overflowX:'auto', paddingBottom:4 }}>
                  <StoryBubble user={{ name:'Seu story', initials:'+', bg:'#1C1C1E' }} ringState="add"    accent={accent} onPress={() => {}} />
                  <StoryBubble user={USERS.sarah}  ringState={rings.sarah}  isTraining={true} accent={accent} onPress={() => tapStory('sarah')} />
                  <StoryBubble user={USERS.marcus} ringState={rings.marcus} accent={accent} onPress={() => tapStory('marcus')} />
                  <StoryBubble user={USERS.elena}  ringState={rings.elena}  accent={accent} onPress={() => tapStory('elena')} />
                  <StoryBubble user={USERS.david}  ringState={rings.david}  accent={accent} onPress={() => tapStory('david')} />
                </div>
              </div>

              {/* ✅ FIX 3.1 — Feed section label */}
              <div style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 20px 8px' }}>
                <span style={{ color:'#444', fontSize:11, fontWeight:700, letterSpacing:1.3, textTransform:'uppercase', whiteSpace:'nowrap' }}>Atividade</span>
                <div style={{ flex:1, height:1, background:'#1A1A1A' }} />
              </div>

              {/* Posts */}
              {/* Demo trigger — pós-treino mode */}
              {t.postEntryPoint === 'postworkout' && !workoutDone && (
                <button onClick={() => setWorkoutDone(true)} style={{
                  display:'flex', alignItems:'center', gap:10,
                  margin:'4px 16px 8px', padding:'11px 14px',
                  background:`${accent}12`, border:`1px dashed ${accent}55`,
                  borderRadius:12, cursor:'pointer', width:'calc(100% - 32px)',
                  color:accent, fontSize:12, fontWeight:700, fontFamily:'inherit',
                }}>
                  <span style={{ fontSize:15 }}>▶</span>
                  <span>Simular: finalizar treino</span>
                </button>
              )}
              <PostCard user={USERS.sarah}  comments={COMMENTS.post1} commentStyle={t.commentStyle} commentsOpen={openComments==='post1'} onToggleComments={() => toggleComments('post1')} kudosActive={kudosActive.post1} kudosCount={kudosCount.post1} onKudos={() => toggleKudos('post1')} accent={accent} postData={t.postData} />
              {t.showSecondPost && (
                <PostCard user={USERS.marcus} comments={COMMENTS.post2} commentStyle={t.commentStyle} commentsOpen={openComments==='post2'} onToggleComments={() => toggleComments('post2')} kudosActive={kudosActive.post2} kudosCount={kudosCount.post2} onKudos={() => toggleKudos('post2')} accent={accent} postData={t.postData} />
              )}
              <div style={{ height:24 }} />
            </div>

            {/* FAB — visível no fluxo 'fab' */}
            {t.postEntryPoint === 'fab' && !composeOpen && (
              <button
                onClick={() => setComposeOpen(true)}
                style={{
                  position:'absolute', right:16, bottom:86,
                  width:52, height:52, borderRadius:'50%',
                  background:accent, border:'none', cursor:'pointer',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:28, color:'#000', fontWeight:300, lineHeight:1,
                  boxShadow:`0 4px 24px ${accent}55`,
                  zIndex:20,
                }}
              >+</button>
            )}

            <BottomNav accent={accent} />

            {/* Comments — bottom-sheet mode overlays the whole screen */}
            {openComments && t.commentStyle === 'sheet' && (
              <CommentsSheet
                post={POSTS[openComments].user}
                comments={POSTS[openComments].comments}
                accent={accent}
                onClose={() => setOpenComments(null)}
              />
            )}

            {/* Compose sheet — FAB flow */}
            {composeOpen && (
              <ComposeSheet accent={accent} onClose={() => setComposeOpen(false)} onPublish={handlePublish} />
            )}

            {/* Post-workout share screen */}
            {workoutDone && (
              <PostWorkoutScreen accent={accent} onDone={() => setWorkoutDone(false)} />
            )}

            {/* Publish toast */}
            {publishToast && (
              <div style={{
                position:'absolute', top:'14%', left:'50%', transform:'translateX(-50%)',
                background:'#1C1C1E', borderRadius:20, padding:'10px 18px',
                display:'flex', alignItems:'center', gap:8,
                color:'#fff', fontSize:13, fontWeight:600, whiteSpace:'nowrap',
                zIndex:300, animation:'kRise 0.2s ease',
                boxShadow:'0 4px 20px rgba(0,0,0,0.6)',
                border:'1px solid #2A2A2A',
              }}>
                <span style={{ color:accent }}>✓</span> Post publicado no feed!
              </div>
            )}
          </div>
        </IOSDevice>
      </div>

      {/* ✅ Tweaks panel — outside IOSDevice so it's not clipped */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Tema" />
        <TweakColor label="Cor de acento" value={t.accent}
          options={['#00D4C8','#FF6B35','#7B61FF','#FFD60A']}
          onChange={v => setTweak('accent', v)} />
        <TweakSection label="Posts" />
        <TweakRadio label="Dados do treino" value={t.postData}
          options={['overlay','card']}
          onChange={v => setTweak('postData', v)} />
        <TweakToggle label="Exibir 2º post" value={t.showSecondPost}
          onChange={v => setTweak('showSecondPost', v)} />
        <TweakSection label="Comentários" />
        <TweakRadio label="Estilo" value={t.commentStyle}
          options={['sheet','inline']}
          onChange={v => { setTweak('commentStyle', v); setOpenComments(null); }} />
        <TweakButton label="Pré-visualizar comentários"
          onClick={() => setOpenComments(openComments ? null : 'post1')} />
        <TweakSection label="Criar Post" />
        <TweakRadio label="Fluxo de entrada" value={t.postEntryPoint}
          options={['fab','postworkout']}
          onChange={v => { setTweak('postEntryPoint', v); setWorkoutDone(false); setComposeOpen(false); }} />
        {t.postEntryPoint === 'postworkout' && (
          <TweakButton label="▶ Simular treino concluído" onClick={() => setWorkoutDone(true)} />
        )}
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<KineticSocial />);
</script>
</body>
</html>
