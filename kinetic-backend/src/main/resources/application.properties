spring.application.name=kinetic-backend

# Supabase PostgreSQL Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=6

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS}

# Supabase Storage (upload de mídia do feed social)
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:social-media}

# Limpeza de mídia órfã (job diário às 05:00)
social.media.cleanup.grace-hours=${MEDIA_CLEANUP_GRACE_HOURS:24}
social.media.cleanup.dry-run=${MEDIA_CLEANUP_DRY_RUN:true}

# Multipart (upload de imagens)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini Configuration
gemini.api.key=${GOOGLE_AI_API_KEY}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models
gemini.api.models=gemini-3.5-flash,gemini-3-flash-preview,gemini-2.5-flash

# CORS Configuration - comma-separated list of allowed origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}
